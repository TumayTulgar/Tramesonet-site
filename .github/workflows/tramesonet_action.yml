name: TRAMESONET Otonom Kinematik Analiz

on:
  schedule:
    # Her saat başı çalışır (Örn: 10:00, 11:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  run-tramesonet-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla (Checkout)
        uses: actions/checkout@v3

      - name: Python Ortamını Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: İşletim Sistemi Bağımlılıklarını Kur (Kritik)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev

      - name: Python Bağımlılıklarını Kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: TRAMESONET Ajanını Çalıştır
        env:
          WUNDERGROUND_API_KEY: ${{ secrets.WUNDERGROUND_API_KEY }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          python tramesonet_agent.py
